<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel ADM • Gestão de Salas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-hover: #334155;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-danger: #ef4444;
      --accent-danger-hover: #dc2626;
      --accent-warning: #f59e0b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #334155;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: all 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    header h1::before {
      content: "⚙️";
      font-size: 1.1rem;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .status-badge {
      background: var(--accent);
      color: #0f172a;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      .container {
        grid-template-columns: 1fr 1fr;      }
      .container > .full-width {
        grid-column: 1 / -1;
      }
    }

    /* Section */
    section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: var(--transition);
    }

    section:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-lg);
    }

    section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    section h2::before {
      content: "";
      width: 4px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Form */
    .form-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }

    @media (min-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }      .form-grid .full {
        grid-column: 1 / -1;
      }
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.375rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition);
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgb(34 197 94 / 0.2);
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;      transition: var(--transition);
      text-decoration: none;
      width: 100%;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-danger {
      background: var(--accent-danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--accent-danger-hover);
    }

    .btn-warning {
      background: var(--accent-warning);
      color: #0f172a;
    }

    .btn-warning:hover {
      background: #d97706;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      width: auto;
    }

    .btn-group {
      display: flex;      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    /* Cards */
    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-bottom: 0.75rem;
      transition: var(--transition);
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      gap: 1rem;
    }

    .card-title {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-primary);
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .card-status {
      padding: 0.25rem 0.625rem;      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending { background: var(--accent-warning); color: #0f172a; }
    .status-active { background: var(--accent); color: #0f172a; }
    .status-closed { background: var(--bg-tertiary); color: var(--text-secondary); }
    .status-rejected { background: var(--accent-danger); color: white; }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    /* Details Panel */
    .details-panel {
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      border: 1px solid var(--border);
    }

    .details-grid {
      display: grid;
      gap: 0.75rem;
      font-size: 0.95rem;
    }

    .details-grid dt {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .details-grid dd {
      color: var(--text-primary);
      margin-left: 0;
      font-weight: 400;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-secondary);
    }
    .empty-state::before {
      content: "📭";
      font-size: 2rem;
      display: block;
      margin-bottom: 0.75rem;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgb(15 23 42 / 0.9);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }

    .modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
      box-shadow: var(--shadow-lg);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      transition: var(--transition);
    }

    .modal-close:hover {
      color: var(--text-primary);
      transform: scale(1.1);
    }

    .modal-image {
      width: 100%;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .modal-image img {
      max-width: 100%;      max-height: 400px;
      border-radius: var(--radius-sm);
      display: block;
    }

    .modal-info {
      background: var(--bg-primary);
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin: 1rem 0;
      font-size: 0.95rem;
      border-left: 3px solid var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .modal-actions .btn {
      flex: 1;
    }

    /* Responsive Table Alternative */
    .list-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-item-info strong {
      display: block;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .list-item-info span {
      display: block;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    /* Toast Notification */    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }

    .toast.error {
      border-left-color: var(--accent-danger);
    }

    .toast.warning {
      border-left-color: var(--accent-warning);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Loading Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-primary) 25%, var(--bg-tertiary) 50%, var(--bg-primary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
      height: 1rem;
      margin: 0.5rem 0;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }    }

    /* Utility */
    .text-center { text-align: center; }
    .text-sm { font-size: 0.875rem; }
    .text-muted { color: var(--text-secondary); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .hidden { display: none !important; }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border);
    }

    /* Focus Visible */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Print */
    @media print {
      body {
        background: white;
        color: black;
      }
      .no-print {
        display: none !important;
      }
    }
    </style>
</head>
<body>

  <!-- Header -->
  <header class="no-print">
    <h1>Painel ADM</h1>
    <div class="header-actions">
      <span class="status-badge">Online</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">

    <!-- Criar Sala -->
    <section class="full-width">
      <h2>➕ Criar Nova Sala</h2>
      <form id="formCriarSala" class="form-grid" onsubmit="criarSala(event)">
        <div class="form-group full">
          <label for="nome">Nome da Sala</label>
          <input type="text" id="nome" placeholder="Ex: Torneio Ranked #01" required>
        </div>
        
        <div class="form-group full">
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao" placeholder="Detalhes sobre a sala...">
        </div>
        
        <div class="form-group">
          <label for="valor">Valor (R$)</label>
          <input type="number" id="valor" step="0.01" placeholder="0.00" required>
        </div>
        
        <div class="form-group">
          <label for="max">Máx. Jogadores</label>
          <input type="number" id="max" min="1" placeholder="100" required>
        </div>
        
        <div class="form-group">
          <label for="data">Data</label>
          <input type="date" id="data" required>
        </div>
        
        <div class="form-group">
          <label for="hora">Horário</label>
          <input type="time" id="hora" required>
        </div>
        
        <div class="form-group full">
          <label for="tipo">Tipo de Partida</label>
          <select id="tipo" required>            <option value="solo">🎮 Solo (1v1)</option>
            <option value="duo">👥 Duo (2v2)</option>
            <option value="squad">🔥 Squad (4v4)</option>
          </select>
        </div>
        
        <div class="form-group full">
          <button type="submit" class="btn">🚀 Criar Sala</button>
        </div>
      </form>
      <p id="resposta" class="text-center text-sm mt-1 text-muted"></p>
    </section>

    <!-- Lista de Salas -->
    <section class="full-width">
      <h2>📋 Salas Ativas</h2>
      <div id="listaSalas">
        <div class="empty-state">Nenhuma sala criada ainda</div>
      </div>
    </section>

    <!-- Detalhes da Sala -->
    <section id="sectionDetalhes" class="full-width hidden">
      <h2>🔍 Detalhes da Sala</h2>
      <div id="detalhesSala"></div>
    </section>

    <!-- Inscritos -->
    <section id="sectionInscritos" class="full-width hidden">
      <h2>👥 Inscritos</h2>
      <div id="listaInscritos">
        <div class="empty-state">Nenhum inscrito nesta sala</div>
      </div>
    </section>

    <!-- Comprovantes -->
    <section id="sectionComprovantes" class="full-width hidden">
      <h2>🧾 Comprovantes de Pagamento</h2>
      <div id="listaComprovantes">
        <div class="empty-state">Nenhum comprovante enviado</div>
      </div>
    </section>

  </main>

  <!-- Modal Comprovante -->
  <div id="modal" class="modal" onclick="fecharModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>🔎 Verificar Comprovante</h3>        <button class="modal-close" onclick="fecharModal()">&times;</button>
      </div>
      
      <div class="modal-image">
        <img id="imgComprovante" src="" alt="Comprovante" onerror="this.src=''; this.alt='Imagem não encontrada'">
      </div>
      
      <div class="modal-info">
        <strong>📝 Informações do Pedido</strong>
        <p id="infoPedido" class="text-sm mt-1"></p>
      </div>
      
      <div class="modal-actions">
        <button class="btn btn-danger" onclick="rejeitarPedido()">✕ Rejeitar</button>
        <button class="btn" onclick="aprovarPedido()">✓ Aprovar</button>
      </div>
    </div>
  </div>

  <!-- Modal Iniciar Sala -->
  <div id="modalIniciar" class="modal" onclick="fecharModalIniciar(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>🎮 Iniciar Sala</h3>
        <button class="modal-close" onclick="fecharModalIniciar()">&times;</button>
      </div>
      
      <div class="form-group">
        <label for="sala_id">ID da Sala no Jogo</label>
        <input type="text" id="sala_id" placeholder="Ex: ABC123" autocomplete="off">
      </div>
      
      <div class="form-group">
        <label for="senha">Senha da Sala</label>
        <input type="text" id="senha" placeholder="••••••" autocomplete="off">
      </div
      
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="fecharModalIniciar()">Cancelar</button>
        <button class="btn" onclick="confirmarInicio()">🚀 Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

<script>const API = "https://tex-journals-beta-tropical.trycloudflare.com";
    const TOKEN = "0";
    let salaAtual = null;
    let pedidoAtual = null;

    // ==========================
    // UTILITÁRIOS
    // ==========================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <span>${type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠'}</span>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function toggleSection(sectionId, show) {
      const section = document.getElementById(sectionId);
      section.classList.toggle('hidden', !show);
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      }).format(value);
    }

    function formatDate(dateStr, timeStr) {
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year} às ${timeStr}`;
    }

    // ==========================
    // CRIAR SALA
    // ==========================
    async function criarSala(e) {
      e.preventDefault();
      
      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = '⏳ Criando...';
      btn.disabled = true;
      try {
        const body = {
          nome: nome.value.trim(),
          descricao: descricao.value.trim(),
          valor: parseFloat(valor.value),
          data: data.value,
          hora: hora.value,
          max: parseInt(max.value),
          tipo: tipo.value
        };

        const res = await fetch(API + "/salas", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "admin-token": TOKEN
          },
          body: JSON.stringify(body)
        });

        const dataRes = await res.json();

        if (dataRes.ok) {
          showToast(`Sala criada com sucesso! ID: ${dataRes.uid}`);
          carregarSalas();
          e.target.reset();
          document.getElementById('resposta').textContent = '';
        } else {
          showToast(dataRes.msg || 'Erro ao criar sala', 'error');
          document.getElementById('resposta').textContent = dataRes.msg;
        }
      } catch (err) {
        showToast('Erro de conexão com o servidor', 'error');
        console.error(err);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    // ==========================
    // CARREGAR SALAS
    // ==========================
    async function carregarSalas() {
      const lista = document.getElementById('listaSalas');
      lista.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';

      try {
        const res = await fetch(API + "/salas");        const salas = await res.json();

        if (!salas || salas.length === 0) {
          lista.innerHTML = '<div class="empty-state">Nenhuma sala encontrada</div>';
          return;
        }

        lista.innerHTML = salas.map(s => `
          <div class="card">
            <div class="card-header">
              <span class="card-title">${s.nome}</span>
              <span class="card-status status-${s.status || 'pending'}">${s.status || 'Pendente'}</span>
            </div>
            <div class="card-meta">
              <span>📅 ${formatDate(s.data, s.hora)}</span>
              <span>💰 ${formatCurrency(s.valor)}</span>
              <span>👥 ${s.inscritos || 0}/${s.max_inscritos}</span>
              <span>🎮 ${s.tipo}</span>
            </div>
            <div class="card-actions">
              <button class="btn btn-sm btn-secondary" onclick="verSala('${s.uid}')">🔍 Ver Detalhes</button>
            </div>
          </div>
        `).join('');

      } catch (err) {
        lista.innerHTML = '<div class="empty-state">❌ Erro ao carregar salas</div>';
        console.error(err);
      }
    }

    // ==========================
    // VER SALA
    // ==========================
    async function verSala(uid) {
      salaAtual = uid;

      try {
        const res = await fetch(API + "/salas/" + uid);
        const data = await res.json();
        
        if (!data.ok) {
          showToast("Sala não encontrada", "error");
          return;
        }

        const s = data.dados;
        
        toggleSection('sectionDetalhes', true);
        toggleSection('sectionInscritos', false);        toggleSection('sectionComprovantes', false);

        document.getElementById('detalhesSala').innerHTML = `
          <div class="details-panel">
            <dl class="details-grid">
              <dt>Nome</dt>
              <dd><strong>${s.nome}</strong></dd>
              
              <dt>Descrição</dt>
              <dd>${s.descricao || 'Sem descrição'}</dd>
              
              <dt>Tipo</dt>
              <dd>${s.tipo?.toUpperCase()}</dd>
              
              <dt>Valor por Jogador</dt>
              <dd>${formatCurrency(s.valor)}</dd>
              
              <dt>Data e Horário</dt>
              <dd>${formatDate(s.data, s.hora)}</dd>
              
              <dt>Capacidade</dt>
              <dd>${s.inscritos || 0} de ${s.max_inscritos} jogadores</dd>
              
              <dt>Status</dt>
              <dd><span class="card-status status-${s.status || 'pending'}">${s.status || 'Pendente'}</span></dd>
            </dl>
            
            <div class="btn-group">
              <button class="btn btn-sm btn-secondary" onclick="verInscritos('${uid}')">👥 Ver Inscritos</button>
              <button class="btn btn-sm btn-secondary" onclick="carregarComprovantes('${uid}')">🧾 Comprovantes</button>
              <button class="btn btn-sm btn-warning" onclick="abrirModalIniciar()">🎮 Iniciar Sala</button>
              <button class="btn btn-sm btn-danger" onclick="fecharSala('${uid}')">🔒 Fechar Sala</button>
            </div>
          </div>
        `;

        // Scroll suave para os detalhes
        document.getElementById('sectionDetalhes').scrollIntoView({ behavior: 'smooth' });

      } catch (err) {
        showToast("Erro ao carregar detalhes da sala", "error");
        console.error(err);
      }
    }

    // ==========================
    // VER INSCRITOS
    // ==========================
    async function verInscritos(uid) {
      toggleSection('sectionInscritos', true);      toggleSection('sectionComprovantes', false);
      
      const lista = document.getElementById('listaInscritos');
      lista.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';

      try {
        const res = await fetch(API + "/salas/" + uid + "/inscritos");
        const inscritos = await res.json();

        if (!inscritos || inscritos.length === 0) {
          lista.innerHTML = "<div class='empty-state'>Nenhum inscrito nesta sala</div>";
          return;
        }

        lista.innerHTML = inscritos.map(i => `
          <div class="card">
            <div class="card-header">
              <span class="card-title">${i.nicks?.join(', ') || 'Sem nick'}</span>
              <span class="text-sm text-muted">Posição: ${i.posicao || '-'}</span>
            </div>
            <div class="card-meta">
              <span>👤 ${i.nome || 'Não informado'}</span>
              <span>💠 Pix: ${i.chavePix ? '••••••••' : 'Não informado'}</span>
            </div>
          </div>
        `).join('');

        document.getElementById('sectionInscritos').scrollIntoView({ behavior: 'smooth' });

      } catch (err) {
        lista.innerHTML = "<div class='empty-state'>❌ Erro ao carregar inscritos</div>";
        console.error(err);
      }
    }

    // ==========================
    // CARREGAR COMPROVANTES
    // ==========================
    async function carregarComprovantes(uid) {
      salaAtual = uid;
      toggleSection('sectionComprovantes', true);
      toggleSection('sectionInscritos', false);
      
      const lista = document.getElementById('listaComprovantes');
      lista.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';

      try {
        const res = await fetch(API + "/admin/salas/" + uid + "/comprovantes", {
          headers: { "admin-token": TOKEN }
        });
        const comprovantes = await res.json();
        
        if (!comprovantes || comprovantes.length === 0) {
          lista.innerHTML = "<div class='empty-state'>Nenhum comprovante enviado</div>";
          return;
        }

        lista.innerHTML = comprovantes.map(p => `
          <div class="card">
            <div class="card-header">
              <span class="card-title">Pedido #${p.id?.slice(0, 8)}</span>
              <span class="text-sm text-muted">${p.nicks?.join(', ')}</span>
            </div>
            <div class="card-actions">
              <button class="btn btn-sm" onclick='abrirComprovante("${p.id}","${p.comprovante}",${JSON.stringify(p.nicks || [])})'>
                👁️ Ver Comprovante
              </button>
            </div>
          </div>
        `).join('');

        document.getElementById('sectionComprovantes').scrollIntoView({ behavior: 'smooth' });

      } catch (err) {
        lista.innerHTML = "<div class='empty-state'>❌ Erro ao carregar comprovantes</div>";
        console.error(err);
      }
    }

    function abrirComprovante(id, arquivo, nicks) {
      pedidoAtual = id;
      
      const img = document.getElementById('imgComprovante');
      img.src = API + "/admin/comprovante/" + salaAtual + "/" + arquivo + "?token=" + TOKEN;
      img.alt = "Comprovante de pagamento";
      
      document.getElementById('infoPedido').innerHTML = `
        <strong>Nicks:</strong> ${nicks.join(', ')}<br>
        <strong>Status:</strong> Aguardando aprovação
      `;
      
      document.getElementById('modal').classList.add('active');
    }

    function fecharModal(e) {
      if (!e || e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('active');
      }
    }
    // ==========================
    // APROVAR / REJEITAR
    // ==========================
    async function aprovarPedido() {
      try {
        const res = await fetch(
          API + "/admin/salas/" + salaAtual + "/aprovar/" + pedidoAtual,
          {
            method: "POST",
            headers: { "admin-token": TOKEN }
          }
        );

        const data = await res.json();

        if (data.ok) {
          showToast(`✅ Aprovado! Código: ${data.codigo}`);
          fecharModal();
          carregarComprovantes(salaAtual);
          verSala(salaAtual);
        } else {
          showToast(data.msg || "Erro ao aprovar", "error");
        }
      } catch (err) {
        showToast("Erro de conexão", "error");
        console.error(err);
      }
    }

    async function rejeitarPedido() {
      if (!confirm("Tem certeza que deseja rejeitar este comprovante?")) return;
      
      try {
        await fetch(
          API + "/admin/salas/" + salaAtual + "/rejeitar/" + pedidoAtual,
          {
            method: "DELETE",
            headers: { "admin-token": TOKEN }
          }
        );

        showToast("❌ Comprovante rejeitado");
        fecharModal();
        carregarComprovantes(salaAtual);
      } catch (err) {
        showToast("Erro ao rejeitar", "error");
        console.error(err);
      }
    }
    // ==========================
    // MODAL INICIAR SALA
    // ==========================
    function abrirModalIniciar() {
      document.getElementById('sala_id').value = '';
      document.getElementById('senha').value = '';
      document.getElementById('modalIniciar').classList.add('active');
    }

    function fecharModalIniciar(e) {
      if (!e || e.target === document.getElementById('modalIniciar')) {
        document.getElementById('modalIniciar').classList.remove('active');
      }
    }

    async function confirmarInicio() {
      const sala_id = document.getElementById("sala_id").value.trim();
      const senha = document.getElementById("senha").value.trim();

      if (!sala_id || !senha) {
        showToast("Preencha todos os campos", "warning");
        return;
      }

      try {
        const res = await fetch(API + "/admin/salas/" + salaAtual + "/iniciar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "admin-token": TOKEN
          },
          body: JSON.stringify({ sala_id, senha })
        });

        const data = await res.json();

        if (data.ok) {
          showToast("🎮 Sala iniciada com sucesso!");
          fecharModalIniciar();
          verSala(salaAtual);
        } else {
          showToast(data.msg || "Erro ao iniciar sala", "error");
        }
      } catch (err) {
        showToast("Erro de conexão", "error");
        console.error(err);
      }
    }
    // ==========================
    // FECHAR SALA
    // ==========================
    async function fecharSala(uid) {
      if (!confirm("Tem certeza que deseja fechar esta sala? Esta ação não pode ser desfeita.")) return;
      
      try {
        await fetch(API + "/admin/salas/" + uid + "/fechar", {
          method: "POST",
          headers: { "admin-token": TOKEN }
        });

        showToast("🔒 Sala fechada com sucesso");
        verSala(uid);
        carregarSalas();
      } catch (err) {
        showToast("Erro ao fechar sala", "error");
        console.error(err);
      }
    }

    // ==========================
    // INICIALIZAÇÃO
    // ==========================
    document.addEventListener('DOMContentLoaded', () => {
      carregarSalas();
      
      // Fecha modais com ESC
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          fecharModal();
          fecharModalIniciar();
        }
      });
    });
</script>

</body>
</html>
