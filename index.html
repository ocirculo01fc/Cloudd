<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salas • Encontre sua Partida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
<style>
   :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-hover: #475569;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-success: #22c55e;
      --accent-warning: #f59e0b;
      --accent-danger: #ef4444;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #334155;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: all 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    header .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Container */
    .container {
      max-width: 800px;
      margin: 0 auto;      padding: 2rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      opacity: 0;
      transition: var(--transition);
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .card:hover::before {      opacity: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-badge {
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.025em;
      white-space: nowrap;
    }

    .badge-open { background: var(--accent-success); color: #0f172a; }
    .badge-started { background: var(--accent); color: white; }
    .badge-full { background: var(--accent-warning); color: #0f172a; }
    .badge-closed { background: var(--bg-tertiary); color: var(--text-secondary); }

    .card-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      padding: 1rem;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .meta-label {      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .meta-value {
      font-weight: 500;
      font-size: 0.95rem;
    }

    .meta-value.price {
      color: var(--accent-success);
      font-weight: 600;
    }

    .card-actions {
      display: flex;
      gap: 0.75rem;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      width: 100%;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn:disabled {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: not-allowed;      transform: none;
    }

    .btn-success {
      background: var(--accent-success);
      color: #0f172a;
    }

    .btn-success:hover {
      background: #16a34a;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text-primary);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      background: var(--bg-primary);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgb(15 23 42 / 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }

    .modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
      box-shadow: var(--shadow-lg);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.75rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      transition: var(--transition);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition);
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgb(59 130 246 / 0.25);
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 480px) {
      .form-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* Code Display */
    .code-display {
      background: var(--bg-primary);
      border: 2px dashed var(--accent);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .code-display .label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .code-display .code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      user-select: all;
    }

    /* File Upload */
    .file-upload {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background: var(--bg-primary);
    }

    .file-upload:hover {
      border-color: var(--accent);
      background: var(--bg-primary);
    }

    .file-upload input[type="file"] {
      display: none;    }

    .file-upload-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .file-upload-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .file-upload-text strong {
      color: var(--accent);
    }

    .file-name {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-primary);
      word-break: break-all;
    }

    /* Nick Inputs */
    .nick-group {
      display: none;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .nick-group.visible {
      display: block;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toast */
    .toast {      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent-success);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      animation: slideIn 0.3s ease;
      max-width: 340px;
    }

    .toast.error {
      border-left-color: var(--accent-danger);
    }

    .toast.warning {
      border-left-color: var(--accent-warning);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      opacity: 0.6;
    }
    .empty-state h3 {
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      padding: 2rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Result Display */
    .result-box {
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      margin-top: 1rem;
      border-left: 4px solid var(--accent-success);
    }

    .result-box.error {
      border-left-color: var(--accent-danger);
    }

    .result-box h4 {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .result-box .info {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--bg-secondary);      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .result-box .info span {
      color: var(--text-secondary);
    }

    .result-box .info strong {
      color: var(--accent);
    }

    /* Utility */
    .text-center { text-align: center; }
    .text-sm { font-size: 0.875rem; }
    .text-muted { color: var(--text-secondary); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .hidden { display: none !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }

    /* Focus */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      header {
        padding: 1rem;
        flex-direction: column;
        gap: 0.75rem;
        text-align: center;
      }
      
      .container {
        padding: 1rem;
      }
      
      .card-meta {       
        grid-template-columns: 1fr 1fr;
      }
    }
    

    .server-box{
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  animation:fadeIn 0.4s ease;
}

.server-box h4{
  margin-bottom:15px;
  font-size:18px;
}

#input-server{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-bottom:15px;
  background:#020617;
  color:white;
  outline:none;
  border:1px solid #334155;
}

#input-server:focus{
  border:1px solid #22c55e;
}

#EscolherS{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

#EscolherS:hover{
  background:#16a34a;
}

#EscolherS:active{
  transform:scale(0.97);
}

/* TOAST */
#toastContainer{
  position:fixed;
  top:20px;
  right:20px;
  z-index:999;
}

.toast{
  padding:12px 18px;
  border-radius:8px;
  margin-bottom:10px;
  color:white;
  font-size:14px;
  animation:slideIn 0.3s ease;
}

.toast.success{ background:#22c55e; }
.toast.error{ background:#ef4444; }

/* animações */
@keyframes slideIn{
  from{transform:translateX(100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.95)}
  to{opacity:1;transform:scale(1)}
}
</style>
</head>

<body>
<div id="d" class="hidden">
  

  <!-- Header -->
  <header>
    <div class="brand">
      <h1>🎮 Salas</h1>
    </div>
    <div class="header-status">
      <span class="status-dot"></span>
      <span>Sistema Online</span>
    </div>
  </header>

  <!-- Main -->
  <main class="container">
    
    <div class="page-header">
      <h2>Salas Disponíveis</h2>
      <p>Escolha uma sala, faça sua inscrição e prepare-se para jogar!</p>
    </div>

    <!-- Lista de Salas -->
    <div id="listaSalas">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>

  </main>

<div id="carregarModal"></div>

  <!-- Modal de Entrada na Sala -->
  <div id="modalCodigo" class="modal" onclick="fecharModalCodigo(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      
      <div class="modal-header">
        <h3>🔑 Entrar na Sala</h3>
        <button class="modal-close" onclick="fecharModalCodigo()">&times;</button>
      </div>

      <div class="form-group">
        <label for="codigoSala">Digite seu código de acesso</label>
        <input type="text" id="codigoSala" placeholder="Ex: ABC123" autocomplete="off" 
               style="text-align:center;font-family:monospace;font-size:1.2rem;letter-spacing:0.1em;text-transform:uppercase;">
      </div>

      <button class="btn" onclick="validarCodigoSala()">🚀 Entrar na Sala</button>

      <div id="respostaCodigo"></div>

    </div>
  </div>
</div>

  <!-- Toast Container -->
<div id="toastContainer"></div>

<div class="server-box" id="servidor">
  <h4>Selecionar Servidor</h4>

  <input id="input-server" placeholder="https://seu-servidor.com" />

  <button id="EscolherS">Entrar</button>
</div>


<script>let salaAtual = null;
let codigoAtual = null;
let salaCodigoAtual = null;
let API = null;

// ==========================
// INICIALIZAÇÃO
// ==========================
document.addEventListener('DOMContentLoaded', () => {

  // botão selecionar servidor
  document.getElementById("EscolherS").onclick = escolherServidor;

  // tenta recuperar servidor salvo
  const apiSalva = localStorage.getItem("apiSalva");
  if (apiSalva) {
  API = apiSalva;

  document.getElementById("servidor").classList.add("hidden");
  document.getElementById("d").classList.remove("hidden");

  showToast("Servidor carregado automaticamente!", "success");
  carregarSalas();
}

  // fecha modais com ESC
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      fecharModal();
      fecharModalCodigo();
    }
  });

  // auto refresh
  setInterval(() => {
    if (API) carregarSalas();
  }, 30000);
});


// ==========================
// SELECIONAR SERVIDOR
// ==========================
function escolherServidor() {
  const input = document.getElementById("input-server");
  let valor = input.value.trim();

  if (!valor) {
    showToast("Digite um servidor!", "error");
    return;
  }

  if (!valor.startsWith("http")) {
    valor = "https://" + valor;
  }

  valor = valor.replace(/\/+$/, "");

  API = valor;


  showToast("Servidor definido com sucesso!", "success");


  // esconde seleção (opcional)
  // esconde seleção
document.getElementById("servidor").classList.add("hidden");

// mostra app
document.getElementById("d").classList.remove("hidden");

  carregarSalas();
}


// ==========================
// VALIDADOR GLOBAL
// ==========================
function precisaAPI() {
  if (!API) {
    showToast("Selecione um servidor primeiro!", "warning");
    return false;
  }
  return true;
}


// ==========================
// TOAST
// ==========================
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <span>${type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠'}</span>
    <span>${message}</span>
  `;
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100px)';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}


// ==========================
// UTILITÁRIOS
// ==========================
function formatCurrency(value) {
  return new Intl.NumberFormat('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  }).format(value);
}

function formatDate(dateStr, timeStr) {
  if (!dateStr) return 'Data não informada';
  const [year, month, day] = dateStr.split('-');
  return `${day}/${month} • ${timeStr || '--:--'}`;
}

function formatarStatus(status) {
  const map = {
    'aberta': { text: 'Aberta', class: 'badge-open', icon: '🟢' },
    'iniciada': { text: 'Em andamento', class: 'badge-started', icon: '🔵' },
    'lotada': { text: 'Lotada', class: 'badge-full', icon: '🟡' },
    'fechada': { text: 'Encerrada', class: 'badge-closed', icon: '🔴' }
  };
  return map[status] || { text: status, class: 'badge-closed', icon: '⚪' };
}


// ==========================
// CARREGAR SALAS
// ==========================
async function carregarSalas() {
  if (!precisaAPI()) return;

  const lista = document.getElementById('listaSalas');

  try {
    const res = await fetch(API + "/salas");

    if (!res.ok) throw new Error("Erro na API");

    const salas = await res.json();

    if (!salas || salas.length === 0) {
      lista.innerHTML = `
        <div class="empty-state">
          <span class="empty-state-icon">🎮</span>
          <h3>Nenhuma sala disponível</h3>
        </div>
      `;
      return;
    }

    lista.innerHTML = salas.map(s => {
      const status = formatarStatus(s.status);

      let botao = '';
      if (s.status === "aberta") {
        botao = `<button class="btn btn-success" onclick="abrirInscricao('${s.uid}')">🎯 Participar</button>`;
      } else if (s.status === "iniciada") {
        botao = `<button class="btn" onclick="abrirModalCodigo('${s.uid}')">🔑 Entrar</button>`;
      } else {
        botao = `<button disabled>Indisponível</button>`;
      }

      return `
        <div class="card">
          <div class="card-header">
            <span>${s.nome}</span>
            <span class="${status.class}">${status.icon} ${status.text}</span>
          </div>

          <div>
            ${formatDate(s.data, s.hora)}<br>
            ${formatCurrency(s.valor)}<br>
            ${s.tipo?.toUpperCase() || 'Solo'}<br>
            ${s.inscritos || 0}/${s.max_inscritos}
          </div>

          ${botao}
        </div>
      `;
    }).join('');

  } catch (err) {
    console.error(err);
    lista.innerHTML = `<p>Erro ao carregar salas</p>`;
  }
}


// ==========================
// INSCRIÇÃO
// ==========================
async function abrirInscricao(uid) {
  if (!precisaAPI()) return;

  salaAtual = uid;

  try {
    const [resSala, resCodigo] = await Promise.all([
      fetch(API + "/salas/" + uid),
      fetch(API + "/salas/" + uid + "/gerar-codigo")
    ]);

    const dataSala = await resSala.json();
    const dataCodigo = await resCodigo.json();

    if (!dataSala.ok) {
      showToast("Sala não encontrada", "error");
      return;
    }

    const sala = dataSala.sala || dataSala;
    const tipo = (sala.tipo || "solo").toLowerCase();

    codigoAtual = dataCodigo.codigo;

    const container = document.getElementById("carregarModal");

    // 🔥 DEFINE QUANTIDADE DE NICKS
    let nickFields = `
      <div class="form-group">
        <label>Nick Principal *</label>
        <input type="text" id="nick1" required>
      </div>
    `;

    if (tipo === "duo" || tipo === "squad") {
      nickFields += `
        <div class="form-group">
          <label>Nick 2</label>
          <input type="text" id="nick2">
        </div>
      `;
    }

    if (tipo === "squad") {
      nickFields += `
        <div class="form-group">
          <label>Nick 3</label>
          <input type="text" id="nick3">
        </div>
        <div class="form-group">
          <label>Nick 4</label>
          <input type="text" id="nick4">
        </div>
      `;
    }

    // 🔥 MONTA HTML COMPLETO
    container.innerHTML = `
      <div class="modal active" onclick="fecharInscricao(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
          
          <div class="modal-header">
            <h3>📝 Inscrição na Sala</h3>
            <button class="modal-close" onclick="fecharInscricao()">&times;</button>
          </div>

          <div class="code-display">
            <div class="label">Seu código de inscrição</div>
            <div class="code">${codigoAtual}</div>
          </div>

          <form onsubmit="enviarComprovante(event)">
            
            <div class="form-group">
              <label>Nome Completo</label>
              <input type="text" id="nomeCompleto" required>
            </div>

            <div class="form-group">
              <label>Chave Pix</label>
              <input type="text" id="chavePix" required>
            </div>

            ${nickFields}

            <div class="form-group">
              <label>Comprovante</label>
              <input type="file" id="comprovante" required>
            </div>

            <button type="submit" class="btn btn-success">
              ✅ Enviar Inscrição
            </button>

          </form>
        </div>
      </div>
    `;

  } catch (err) {
    console.error(err);
    showToast("Erro ao abrir inscrição", "error");
  }
}


// ==========================
// ENVIAR COMPROVANTE
// ==========================
async function enviarComprovante(e) {
  e.preventDefault();

  if (!precisaAPI()) return;

  const btn = e.target.querySelector('button[type="submit"]');
  const original = btn.innerHTML;

  btn.innerHTML = "Enviando...";
  btn.disabled = true;

  try {
    const form = new FormData();

    // 🔥 DADOS
    form.append("codigo", codigoAtual);
    form.append("nomeCompleto", document.getElementById("nomeCompleto").value);
    form.append("chavePix", document.getElementById("chavePix").value);
    form.append("nick", document.getElementById("nick1").value);

    // opcionais
    const nick2 = document.getElementById("nick2")?.value;
    const nick3 = document.getElementById("nick3")?.value;
    const nick4 = document.getElementById("nick4")?.value;

    if (nick2) form.append("nick2", nick2);
    if (nick3) form.append("nick3", nick3);
    if (nick4) form.append("nick4", nick4);

    // 📎 arquivo
    const file = document.getElementById("comprovante").files[0];

    if (!file) {
      showToast("Selecione o comprovante", "warning");
      return;
    }

    // 🔥 valida tamanho (10MB)
    if (file.size > 10 * 1024 * 1024) {
      showToast("Arquivo muito grande (máx 10MB)", "error");
      return;
    }

    form.append("comprovante", file);

    const res = await fetch(API + "/salas/" + salaAtual + "/enviar-comprovante", {
      method: "POST",
      body: form
    });

    if (!res.ok) throw new Error("Erro no servidor");

    let data;
    try {
      data = await res.json();
    } catch {
      throw new Error("Resposta inválida da API");
    }

    if (data.ok) {
      showToast("Inscrição enviada!");
      fecharInscricao(); // ✅ corrigido
      carregarSalas();
    } else {
      showToast(data.msg || "Erro", "error");
    }

  } catch (err) {
    console.error(err);
    showToast(err.message || "Erro de conexão", "error");
  } finally {
    btn.innerHTML = original;
    btn.disabled = false;
  }
}




// ==========================
// CÓDIGO DA SALA
// ==========================
async function validarCodigoSala() {
  if (!precisaAPI()) return;
  
  const codigo = document.getElementById('codigoSala').value.trim();
  
  try {
    const res = await fetch(API + "/salas/" + salaCodigoAtual + "/validar-codigo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ codigo })
    });
    
    const data = await res.json();
    
    const resposta = document.getElementById("respostaCodigo");
    if (data.ok) {
  showToast("Código válido!", "success");

  const salaId = data.config?.sala_id;
  const senha = data.config?.senha;

  resposta.innerHTML = `
    <div class="card" style="margin-top:15px;text-align:center">
      <h3>🎮 Dados da Sala</h3>
      
      <p><strong>ID da Sala:</strong></p>
      <div style="font-size:1.5rem;font-family:monospace">${salaId}</div>
      
      <p style="margin-top:10px"><strong>Senha:</strong></p>
      <div style="font-size:1.5rem;font-family:monospace">${senha}</div>
    </div>
  `;
}else {
      showToast("Código inválido", "error");
      
      resposta.innerHTML = `
        <div class="text-center" style="margin-top:10px;color:#ef4444">
          ❌ Código inválido
        </div>
      `;
    }
    
  } catch (err) {
    console.error(err);
    showToast("Erro de conexão", "error");
  }
}
// ==========================  
// MODAL CÓDIGO  
// ==========================  
function abrirModalCodigo(uid) {  
  salaCodigoAtual = uid;  
  document.getElementById('codigoSala').value = '';  
  document.getElementById('respostaCodigo').innerHTML = '';  
  document.getElementById('modalCodigo').classList.add('active');  
  document.getElementById('codigoSala').focus();  
}  

function fecharModalCodigo(e) {  
  if (!e || e.target === document.getElementById('modalCodigo')) {  
    document.getElementById('modalCodigo').classList.remove('active');  
  }  
}  
function fecharInscricao(e) {
  const modal = document.querySelector("#carregarModal .modal");

  if (!e || e.target === modal) {
    document.getElementById("carregarModal").innerHTML = "";

    salaAtual = null;
    codigoAtual = null;
  }
}
</script>
